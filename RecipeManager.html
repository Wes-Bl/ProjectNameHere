        <div class="recipeManager">
        <h1>Recipe Manager</h1>
            
        <!--Recipe Input here-->
        <table>
            <tr>
                <td><label for="name">Recipe Name:</label></td>
                <td><input type="text" name="name" id="recipe-name"></td>
            </tr>

            <tr>
                <td><label for="ingredients">Ingredients:</label></td>
                <td><input type="text" name="ingredients" id="ingrs"></td>
            </tr>

            <tr>
                <td><button type="button" id="add-ing">Add Ingredient</button></td>
                <td><ul id="ing-list">
                    <!--Ingredients go here-->
                </ul></td>
            </tr>

            <tr>
                <td><label for="instructions">Instructions:</label></td>
                <td><input type="text" name="instructions" id="insts"></td>
            </tr>
        </table>

        <button type="button" id="add-btn">Add</button>
        <ul id="recipe-list">
            <!--Recipes go here-->
        </ul>
        </div>
